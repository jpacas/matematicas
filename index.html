<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculus II — Mini-Lecciones</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&family=JetBrains+Mono:wght@400;500&display=swap" />

  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css" />
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ── SIDEBAR ─────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <span class="logo-symbol">∫</span>
        <div>
          <div class="logo-title">Calculus II</div>
          <div class="logo-sub">Mini-Lecciones</div>
        </div>
      </div>
    </div>

    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="search" class="search-input" placeholder="Buscar lección..." autocomplete="off" />
    </div>

    <nav class="lesson-nav" id="lessonNav"></nav>

    <div class="sidebar-footer">
      <div id="lessonCount" class="lesson-count"></div>
    </div>
  </aside>

  <!-- ── MAIN ────────────────────────────────────────── -->
  <main class="main">

    <!-- Empty state -->
    <div class="empty-state" id="emptyState">
      <div class="empty-integral">∫</div>
      <h2 class="empty-title">Selecciona una lección</h2>
      <p class="empty-sub">Elige un tema del menú lateral para generar tu mini-clase personalizada con Claude.</p>
      <div class="empty-chips">
        <span class="chip">📐 KaTeX · ecuaciones pro</span>
        <span class="chip">✨ Generado con IA</span>
        <span class="chip">🏋️ Ejercicios con soluciones</span>
      </div>
    </div>

    <!-- Lesson view -->
    <div class="lesson-view" id="lessonView" style="display:none">

      <!-- Hero -->
      <header class="lesson-hero">
        <div class="hero-inner">
          <div class="hero-tag" id="heroTag"></div>
          <h1 class="hero-title" id="heroTitle"></h1>
          <div class="hero-meta" id="heroMeta"></div>
          <div class="hero-actions">
            <button class="btn-generate" id="btnGenerate">
              <span class="btn-icon">✨</span>
              <span class="btn-label">Generar Lección</span>
            </button>
            <button class="btn-copy" id="btnCopy" style="display:none" title="Copiar texto">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15">
                <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
              </svg>
              Copiar
            </button>
          </div>
        </div>
        <div class="hero-progress-bar" id="heroProgress" style="display:none">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </header>

      <!-- Streaming preview -->
      <div class="stream-preview" id="streamPreview" style="display:none">
        <div class="stream-cursor" id="streamText"></div>
      </div>

      <!-- Error -->
      <div class="error-box" id="errorBox" style="display:none"></div>

      <!-- Rendered lesson -->
      <article class="lesson-content" id="lessonContent"></article>

    </div><!-- /lesson-view -->
  </main>

  <script src="lessons.js"></script>
  <script src="app.js"></script>
</body>
</html>
